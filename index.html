<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぽけっとるな — ドットにゃんこ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#3a2a20;
    --crt-bg:#3d2b22;
    --crt-frame:#f3e3d3;
    --screen:#fdf6ec;
    --accent:#e88ea0;
    --accent-deep:#c96b81;
    --line:#5a4536;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:radial-gradient(ellipse at 50% 0%, #4a352a 0%, #241a14 70%);
    font-family:'Zen Maru Gothic', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:16px;
  }
  .console{
    width:100%;
    max-width:460px;
    background:var(--crt-frame);
    border-radius:22px;
    padding:16px;
    box-shadow:0 20px 50px rgba(0,0,0,.5), inset 0 0 0 2px #d8c3a5;
  }
  .console-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:2px 8px 10px;
  }
  .console-top .brand{
    font-family:'DotGothic16', monospace;
    font-size:11px;
    letter-spacing:1px;
    color:#8a6a4a;
  }
  .console-top .day-pill{
    font-family:'DotGothic16', monospace;
    font-size:11px;
    background:var(--accent-deep);
    color:#fff6f2;
    padding:4px 10px;
    border-radius:20px;
  }
  .screen-wrap{
    position:relative;
    background:var(--crt-bg);
    border-radius:10px;
    padding:10px;
    box-shadow:inset 0 0 0 3px #1c130d, inset 0 8px 24px rgba(0,0,0,.5);
  }
  .screen{
    position:relative;
    background:var(--screen);
    border-radius:6px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .scanlines{
    position:absolute; inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(61,43,34,0.04) 0px,
      rgba(61,43,34,0.04) 1px,
      transparent 2px,
      transparent 3px
    );
    pointer-events:none;
    z-index:2;
  }
  .stage{
    position:relative;
    height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 50% 40%, #fbeadd 0%, #f3d8dd 70%, #eecdd6 100%);
    overflow:hidden;
  }
  .dot-cat-wrap{
    position:relative;
    width:100px; height:100px;
    display:flex;
    align-items:center;
    justify-content:center;
    transform:scale(1.5); /* ドット絵を拡大 */
    image-rendering:pixelated; /* ドットをくっきりさせる */
    animation:bob 3s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform:translateY(0) scale(1.5); }
    50%{ transform:translateY(-4px) scale(1.5); }
  }
  /* ドット絵（CSSで描画） */
  .cat-body{ position:absolute; width:32px; height:24px; background:#aaa; border-radius:12px 12px 6px 6px; top:48px; }
  .cat-ear{ position:absolute; width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-bottom:12px solid #aaa; top:-10px; }
  .cat-ear.left{ left:2px; transform:rotate(-15deg); }
  .cat-ear.right{ right:2px; transform:rotate(15deg); }
  .cat-face{ position:absolute; width:24px; height:16px; background:#ccc; border-radius:8px; top:4px; left:4px; z-index:1; }
  .cat-eye{ position:absolute; width:3px; height:3px; background:#222; border-radius:50%; top:5px; z-index:2; transition:background .2s; }
  .cat-eye.left{ left:6px; }
  .cat-eye.right{ right:6px; }
  .cat-mouse{ position:absolute; width:6px; height:3px; background:#222; border-radius:0 0 3px 3px; top:10px; left:9px; z-index:2; transition:all .2s; }
  .cat-tail{ position:absolute; width:8px; height:16px; background:#aaa; border-radius:0 8px 8px 0; right:-6px; top:40px; z-index:0; transform:rotate(20deg); }

  /* 表情の切り替え設定（クラスで制御） */
  /* 通常 (idle) */
  .dot-cat-wrap.idle .cat-body, .dot-cat-wrap.idle .cat-ear, .dot-cat-wrap.idle .cat-tail{ background:#aaa; }
  .dot-cat-wrap.idle .cat-face{ background:#ccc; }

  /* おしゃべり (talk) - 耳がピンクに、目が細まる */
  .dot-cat-wrap.talk .cat-ear{ border-bottom-color:#eacdd6; }
  .dot-cat-wrap.talk .cat-face{ background:#eecdd6; }
  .dot-cat-wrap.talk .cat-eye{ height:1px; background:#555; }
  .dot-cat-wrap.talk .cat-mouse{ border-radius:3px; height:2px; top:11px; }

  /* うれしい (happy) - 体がピンクに、目がキラキラ */
  .dot-cat-wrap.happy .cat-body, .dot-cat-wrap.happy .cat-ear, .dot-cat-wrap.happy .cat-tail{ background:#e88ea0; }
  .dot-cat-wrap.happy .cat-face{ background:#f3d8dd; }
  .dot-cat-wrap.happy .cat-eye{ background:#c96b81; }
  .dot-cat-wrap.happy .cat-mouse{ border-radius:3px; height:2px; top:11px; background:#c96b81;}


  .zzz{
    position:absolute; top:8px; right:25%;
    font-family:'DotGothic16', monospace;
    font-size:13px; color:#8a6a4a; opacity:0;
    z-index:3;
  }
  .zzz.show{ opacity:1; }
  .log{
    position:relative;
    z-index:3;
    height:105px;
    overflow-y:auto;
    padding:10px 12px;
    font-size:13px;
    line-height:1.5;
    border-top:2px dashed #eccdd6;
    background:var(--screen);
  }
  .log::-webkit-scrollbar{ width:6px; }
  .log::-webkit-scrollbar-thumb{ background:#e0bcc4; border-radius:4px; }
  .log p{ margin:0 0 6px; }
  .log .pote-line{ color:var(--accent-deep); font-weight:700; }
  .log .pote-line::before{ content:"ねこ： "; }
  .log .sys-line{ color:#9a8a78; font-size:11.5px; }
  .controls{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .row{ display:flex; gap:6px; }
  input[type=text], select{
    flex:1;
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:13.5px;
    padding:8px 10px;
    border-radius:8px;
    border:2px solid var(--line);
    background:#fffaf3;
    color:var(--ink);
    min-width:0;
  }
  select{ flex:0 0 90px; }
  button{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    color:#fff;
    background:var(--accent);
    transition:transform .1s ease;
    white-space:nowrap;
  }
  button:active{ transform:scale(.96); }
  button.secondary{ background:#b78a5e; }
  button.ghost{
    background:transparent;
    color:#7a5c3e;
    border:2px solid #7a5c3e;
    font-size:11px;
    padding:5px 8px;
  }
  .bottom-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    gap:6px;
  }
  .vocab-count{
    font-family:'DotGothic16', monospace;
    font-size:11px;
    color:#7a5c3e;
  }
  .save-row{ display:flex; gap:4px; }
  #fileInput{ display:none; }
  .toast{
    position:fixed; bottom:20px; left:50%;
    transform:translateX(-50%);
    background:var(--ink); color:#fff6f2;
    padding:6px 14px; border-radius:20px;
    font-size:12px;
    opacity:0; pointer-events:none;
    transition:opacity .2s ease;
    z-index:99;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<div class="console">
  <div class="console-top">
    <div class="brand">POCKET CAT — ドットにゃんこ試作</div>
    <div class="day-pill" id="dayPill">1日目</div>
  </div>

  <div class="screen-wrap">
    <div class="screen">
      <div class="scanlines"></div>
      <div class="stage">
        <div class="zzz" id="zzz">Zzz</div>
        <div class="dot-cat-wrap idle" id="catWrap">
          <!-- ドットにゃんこ（CSSで描画） -->
          <div class="cat-ear left"></div>
          <div class="cat-ear right"></div>
          <div class="cat-tail"></div>
          <div class="cat-body"></div>
          <div class="cat-face">
            <div class="cat-eye left"></div>
            <div class="cat-eye right"></div>
            <div class="cat-mouse"></div>
          </div>
        </div>
      </div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="controls">
    <div class="row">
      <input type="text" id="talkInput" placeholder="にゃんこに話しかける…" maxlength="20">
      <button id="talkBtn">はなす</button>
    </div>
    <div class="row">
      <select id="wordCategory">
        <option value="greeting">あいさつ</option>
        <option value="food">たべもの</option>
        <option value="name">なまえ</option>
        <option value="feeling">きもち</option>
        <option value="place">ばしょ</option>
        <option value="verb">どうし</option>
      </select>
      <input type="text" id="wordInput" placeholder="おしえることば" maxlength="12">
      <button id="teachBtn" class="secondary">おしえる</button>
    </div>
  </div>

  <div class="bottom-row">
    <span class="vocab-count" id="vocabCount">おぼえたことば：0こ</span>
    <div class="save-row">
      <button class="ghost" id="saveBtn">きろく保存</button>
      <button class="ghost" id="loadBtn">よみこむ</button>
      <input type="file" id="fileInput" accept=".json">
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
